[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume — create in Railway dashboard, mount at /data
# All SQLite DB, ChromaDB, uploads, photos, voice_samples go here
[[volumes]]
mountPath = "/data"
